<section>
  <h2>L2TV FORCE RATE 譜面定数表</h2>
  <p>
    L2TVのFORCE RATEで使用している譜面定数を、整数部分ごとの難易度に分類した表です。
    定数1.00〜1.99はL1、2.00〜2.99はL2として扱い、L27まで収録しています。
  </p>
  <p>
    対象は発狂BMS難易度表、初代Overjoy、第二期Overjoyです。
    譜面定数はLR2IR Archiveの有効なスコア記録を参照し、クリア人数に対するAAA到達割合を重視して算出しています。
  </p>
  <ul>
    <li>L1: 1.00〜1.99</li>
    <li>L2〜L26: 各整数値以上、次の整数値未満</li>
    <li>L27: 27.00</li>
  </ul>
  <p>制作: HiLowPsi</p>
</section>
